name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - packages/models-py
          - packages/agents-py
          - services/ingestion-api
          - services/model-gateway
          - services/orchestrator
          - services/report-generator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: install
        run: |
          python -m pip install -U pip
          # Install the shared local packages first (skip whichever is the target).
          for shared in packages/models-py packages/agents-py; do
            if [ "${{ matrix.package }}" != "$shared" ]; then
              pip install -e "$shared"
            fi
          done
          pip install -e "${{ matrix.package }}[dev]" || pip install -e "${{ matrix.package }}"
      - name: pytest
        run: |
          if [ -d "${{ matrix.package }}/tests" ]; then
            cd "${{ matrix.package }}" && pytest -v
          else
            echo "no tests in ${{ matrix.package }} yet"
          fi

  go:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: collector } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: go vet ./...
      - run: go test ./...
      - run: go build ./...

  rust:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/normalizer-worker } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with: { workspaces: "services/normalizer-worker -> target" }
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  db-schema:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: auditcore
          POSTGRES_USER: auditcore
          POSTGRES_PASSWORD: ci-only
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U auditcore -d auditcore"
          --health-interval 3s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - name: apply init schema (fails on any DDL error)
        env:
          PGPASSWORD: ci-only
        run: |
          psql -h localhost -U auditcore -d auditcore -v ON_ERROR_STOP=1 \
            -f deploy/docker-compose/postgres/init/01_schema.sql
      - name: assert expected tables exist
        env:
          PGPASSWORD: ci-only
        run: |
          for t in tenants runs assets evidence_items observations report_sections audit_log; do
            psql -h localhost -U auditcore -d auditcore -tAc \
              "SELECT to_regclass('public.$t')" | grep -qx "$t" \
              || { echo "::error::missing table $t"; exit 1; }
          done
          echo "all expected tables present"

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install hwloc
        run: sudo apt-get update && sudo apt-get install -y libhwloc-dev libsensors4-dev cmake
      - name: configure
        run: cmake -S collector/hwprobe -B collector/hwprobe/build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build collector/hwprobe/build -j
      - name: smoke
        run: ./collector/hwprobe/build/hwprobe --version

  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install opa
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x /usr/local/bin/opa
      - name: opa test
        run: opa test policy/ -v
      - name: opa fmt check
        run: opa fmt --diff --fail policy/
      - name: allowlist drift check
        run: python tools/check_allowlist_drift.py

  schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: install
        run: pip install -e packages/models-py
      - name: regenerate
        run: python packages/models-py/scripts/generate_schemas.py
      - name: check no drift
        run: |
          if [ -n "$(git status --porcelain schemas/)" ]; then
            echo "::error::schemas/ is out of date — run the generator and commit"
            git --no-pager diff schemas/
            exit 1
          fi
