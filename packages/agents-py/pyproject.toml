[project]
name = "auditcore-agents"
version = "0.1.0"
description = "AuditCore agent registry loader — reads agent.yaml, prompts, and output schemas"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5", "jsonschema>=4.22"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["auditcore_agents"]

[tool.ruff]
line-length = 100
target-version = "py312"
