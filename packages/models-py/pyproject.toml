[project]
name = "auditcore-models"
version = "0.1.0"
description = "Canonical data models for AuditCore"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["auditcore_models"]
