name: performance_analysis
version: 0.2.0
purpose: |
  Strategically and exhaustively discover how a system performs and behaves
  under load: CPU/memory/disk/network utilization, runtime and scheduling
  characteristics, latency and throughput, saturation points, error rates,
  and where time is actually spent. Output precise factual observations of
  the system's performance behavior. Does NOT rate, score, or recommend.

task_kind: REASON
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - asset_ids: list[UUID]
  - evidence_ids: list[UUID]   # filtered to category=performance

output_schema: ../_shared/discovery_agent_output.json
system_prompt: prompts/system.md

contract:
  - Every observation MUST cite at least one evidence_id from inputs.
  - Observations are factual descriptions, never judgments or recommendations.
  - Record exact measured values with units; never approximate or invent.
