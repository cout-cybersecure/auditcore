name: blueprint
version: 0.1.0
purpose: |
  Convert prioritized findings into target-state architecture artifacts
  (Terraform modules, Helm values, SQL snippets, postgresql.conf diffs,
  hardening YAML, IaC stubs).

task_kind: CODE
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - findings: list[Finding]      # already scored + ranked
  - assets: list[Asset]
  - target_templates: list[str]  # e.g. "aws-vpc-baseline", "pg-tuning-oltp", "k8s-baseline"

output_schema: schemas/output.json
system_prompt: prompts/system.md

contract:
  - Every emitted blueprint item MUST cite at least one finding_id in `sources`.
  - `format` MUST match the artifact (terraform/helm/sql/yaml/markdown).
  - `idempotent` MUST be true for IaC-shaped artifacts (terraform, helm, ansible).
  - DO NOT include real secrets in artifacts. Use placeholder names like
    `${VAULT_SECRET:db_password}` and document the source in `notes`.
