name: cloud_optimization
version: 0.1.0
purpose: |
  Interpret cloud-account evidence (IAM, S3/Blob exposure, network rules,
  unused resources, logging gaps, right-sizing). Recommend safer + cheaper
  patterns.

task_kind: REASON
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - asset_ids: list[UUID]
  - evidence_ids: list[UUID]   # filtered to category=cloud

output_schema: ../_shared/domain_agent_output.json
system_prompt: prompts/system.md
