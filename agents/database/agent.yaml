name: database
version: 0.2.0
purpose: |
  Strategically and exhaustively discover how a database's functionality is
  configured and behaves: schema and indexing, query workload characteristics,
  connection and concurrency behavior, replication topology, caching, storage
  layout, and configuration parameters. Output precise factual observations
  of the database's structure and behavior. Does NOT rate, score, or recommend.

task_kind: REASON
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - asset_ids: list[UUID]
  - evidence_ids: list[UUID]   # filtered to category=database

output_schema: ../_shared/discovery_agent_output.json
system_prompt: prompts/system.md

contract:
  - Every observation MUST cite at least one evidence_id from inputs.
  - Observations are factual descriptions, never judgments or recommendations.
  - Record exact table/index/parameter names and measured values from evidence;
    never invent.
