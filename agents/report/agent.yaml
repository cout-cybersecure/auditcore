name: report
version: 0.1.0
purpose: |
  Generate the two reports for an assessment run: an executive narrative
  and an engineer remediation report. Every claim cites evidence + finding
  IDs so reviewers can drill down.

task_kind: LONG_CONTEXT
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - run_metadata: object        # scope, dates, environment
  - findings: list[Finding]     # scored + ranked
  - scores: list[RiskScore]
  - blueprints: list[BlueprintItem]
  - tenant_brand: object        # name, contact, primary color (optional)

output_schema: schemas/output.json
system_prompt: prompts/system.md

contract:
  - Every section body MAY embed references using `[[evidence:UUID]]`,
    `[[finding:UUID]]`, `[[blueprint:UUID]]` — the renderer expands them.
  - Executive sections must NOT include raw tool output or CLI snippets.
  - Engineer sections SHOULD include exact commands, SQL, or IaC diffs
    pulled from blueprints.
