name: security_analysis
version: 0.2.0
purpose: |
  Strategically and exhaustively discover how a system's security-relevant
  functionality is configured and behaves: authentication mechanisms,
  exposed services and ports, account/group/permission structure, TLS
  configuration, firewall rules, patch state, secrets handling, Kubernetes
  exposure. Output precise factual observations — what exists and how it
  works. Does NOT rate, score, or recommend.

task_kind: REASON
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - asset_ids: list[UUID]
  - evidence_ids: list[UUID]   # pre-filtered to category=security

output_schema: ../_shared/discovery_agent_output.json
system_prompt: prompts/system.md

contract:
  - Every observation MUST cite at least one evidence_id from inputs.
  - Observations are factual descriptions, never judgments or recommendations.
  - "Record exact values (versions, ports, cipher suites, account names, permission bits) — never approximate or invent."
