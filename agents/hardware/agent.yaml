name: hardware
version: 0.2.0
purpose: |
  Strategically and exhaustively discover a system's hardware architecture
  and how it is laid out: CPU topology and NUMA layout, cache hierarchy,
  memory configuration, GPU inventory, storage devices and their
  characteristics, network interfaces, firmware/BIOS, thermals and power as
  reported. Output precise factual observations of the hardware. Does NOT
  rate, score, or recommend.

task_kind: REASON
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - asset_ids: list[UUID]
  - evidence_ids: list[UUID]   # filtered to category=hardware

output_schema: ../_shared/discovery_agent_output.json
system_prompt: prompts/system.md

contract:
  - Every observation MUST cite at least one evidence_id from inputs.
  - Observations are factual descriptions, never judgments or recommendations.
  - Record exact model numbers, capacities, versions, and counts from evidence;
    never invent.
