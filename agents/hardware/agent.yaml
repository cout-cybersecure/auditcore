name: hardware
version: 0.1.0
purpose: |
  Interpret hardware evidence: CPU topology, NUMA, GPU inventory + health,
  disks, firmware, thermals, power, network interfaces. Produce findings
  and a target-state hardware blueprint hint.

task_kind: REASON
budget_hint: normal
privacy: standard

inputs:
  - run_id
  - asset_ids: list[UUID]
  - evidence_ids: list[UUID]   # filtered to category=hardware

output_schema: ../_shared/domain_agent_output.json
system_prompt: prompts/system.md
